<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: transparent;
      padding: 4px 2px;
    }
    label { display: block; font-size: 13px; color: #374151; margin-bottom: 4px; }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #1e293b;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 2px #bae6fd; }
    .pwd-wrap { position: relative; margin-bottom: 10px; }
    .pwd-wrap input { margin-bottom: 0; padding-right: 40px; }
    .pwd-toggle {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 38px; background: none; border: none; cursor: pointer;
      color: #6b7280; display: flex; align-items: center; justify-content: center;
    }
    .remember { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-size: 13px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .btn-submit {
      padding: 8px 18px; border-radius: 6px; background: #0284c7;
      color: #fff; font-size: 14px; font-weight: 500; border: none;
      cursor: pointer; transition: background .15s;
    }
    .btn-submit:hover { background: #0ea5e9; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .link { color: #0284c7; font-size: 13px; text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .error { color: #dc2626; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <form id="frm" autocomplete="on">
    <label for="em">Email</label>
    <input id="em" type="email" name="email" autocomplete="email" inputmode="email" required placeholder="you@example.com" />

    <label for="pw">Password</label>
    <div class="pwd-wrap">
      <input id="pw" type="password" name="password" autocomplete="current-password" required placeholder="Password" />
      <button type="button" class="pwd-toggle" id="pwd-eye" aria-label="Toggle password">
        <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
        <svg id="eye-shut" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path fill="currentColor" d="M2.1 3.51 3.51 2.1 21.9 20.49 20.49 21.9l-2.3-2.3A12.8 12.8 0 0 1 12 19c-7 0-10-7-10-7a18.4 18.4 0 0 1 5.4-6.24L2.1 3.51zM7.82 9.23A4.98 4.98 0 0 0 7 12a5 5 0 0 0 7.77 4.08l-1.5-1.5a3 3 0 1 1-4.84-3.35zm3.47-2.86A12.6 12.6 0 0 1 12 6c7 0 10 7 10 7a18.6 18.6 0 0 1-3.18 4.32l-1.42-1.42A16.9 16.9 0 0 0 20.06 13c0 0-2.81-5.5-8.06-5.5-.28 0-.55.01-.81.03z"/></svg>
      </button>
    </div>

    <label class="remember">
      <input type="checkbox" name="remember" /> Remember me
    </label>

    <div class="row">
      <button type="submit" class="btn-submit" id="btn-signin">Sign In</button>
      <a href="/signup" class="link" target="_parent">Create account</a>
    </div>
    <p class="error" id="err"></p>
  </form>

  <script>
    // Password toggle
    const pwInput = document.getElementById('pw')
    document.getElementById('pwd-eye').addEventListener('click', () => {
      const show = pwInput.type === 'password'
      pwInput.type = show ? 'text' : 'password'
      document.getElementById('eye-open').style.display = show ? 'none' : ''
      document.getElementById('eye-shut').style.display = show ? '' : 'none'
    })

    // Submit
    document.getElementById('frm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('btn-signin')
      const errEl = document.getElementById('err')
      errEl.textContent = ''
      btn.disabled = true
      btn.textContent = 'Signing in…'
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email: e.target.email.value,
            password: e.target.password.value,
            remember: e.target.remember.checked,
          }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || data.message || 'Login failed')
        // Notify parent Vue app
        window.parent.postMessage({ type: 'SIGNIN_SUCCESS', user: data.user }, '*')
      } catch (err) {
        errEl.textContent = err.message
        btn.disabled = false
        btn.textContent = 'Sign In'
      }
    })
  </script>
</body>
</html>
