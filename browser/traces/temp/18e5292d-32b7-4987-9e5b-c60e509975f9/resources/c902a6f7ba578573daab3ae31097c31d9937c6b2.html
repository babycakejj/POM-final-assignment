<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #f8fafc;
      padding: 24px 20px;
    }
    h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
    p.sub { color: #64748b; font-size: 13px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #374151; margin-bottom: 4px; }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #1e293b;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 2px #bae6fd; }
    .pwd-wrap { position: relative; margin-bottom: 4px; }
    .pwd-wrap input { margin-bottom: 0; padding-right: 40px; }
    .pwd-toggle {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 38px; background: none; border: none; cursor: pointer;
      color: #6b7280; display: flex; align-items: center; justify-content: center;
    }
    .hint { font-size: 12px; margin-bottom: 10px; }
    .hint span { display: block; }
    .hint .ok  { color: #059669; }
    .hint .bad { color: #dc2626; }
    .error { color: #dc2626; font-size: 13px; margin-top: 6px; }
    .field-err { color: #dc2626; font-size: 12px; margin-top: -8px; margin-bottom: 8px; }
    .row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .btn-submit {
      padding: 8px 20px; border-radius: 6px; background: #059669;
      color: #fff; font-size: 14px; font-weight: 500; border: none;
      cursor: pointer; transition: background .15s;
    }
    .btn-submit:hover:not(:disabled) { background: #10b981; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .terms { font-size: 11px; color: #94a3b8; margin-top: 12px; }
    .terms a { color: #0284c7; text-decoration: none; }
    .terms a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Create Account</h2>
  <p class="sub">Fill in the details below to get started.</p>

  <form id="frm" autocomplete="on" novalidate>
    <label for="full-name">Full Name</label>
    <input id="full-name" type="text" name="full_name" autocomplete="name" required placeholder="Your full name" />

    <label for="phone">Phone</label>
    <input id="phone" type="tel" name="phone" inputmode="numeric" maxlength="10" required placeholder="0XXXXXXXXX" />
    <p class="field-err" id="phone-err" style="display:none"></p>

    <label for="em">Email</label>
    <input id="em" type="email" name="email" autocomplete="email" inputmode="email" required placeholder="you@example.com" />
    <p class="field-err" id="email-err" style="display:none"></p>

    <label for="pw">Password</label>
    <div class="pwd-wrap">
      <input id="pw" type="password" name="password" autocomplete="new-password" required placeholder="Password" />
      <button type="button" class="pwd-toggle" id="pwd-eye1" aria-label="Toggle password">
        <svg id="eye1-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
        <svg id="eye1-shut" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path fill="currentColor" d="M2.1 3.51 3.51 2.1 21.9 20.49 20.49 21.9l-2.3-2.3A12.8 12.8 0 0 1 12 19c-7 0-10-7-10-7a18.4 18.4 0 0 1 5.4-6.24L2.1 3.51zM7.82 9.23A4.98 4.98 0 0 0 7 12a5 5 0 0 0 7.77 4.08l-1.5-1.5a3 3 0 1 1-4.84-3.35zm3.47-2.86A12.6 12.6 0 0 1 12 6c7 0 10 7 10 7a18.6 18.6 0 0 1-3.18 4.32l-1.42-1.42A16.9 16.9 0 0 0 20.06 13c0 0-2.81-5.5-8.06-5.5-.28 0-.55.01-.81.03z"/></svg>
      </button>
    </div>
    <div class="hint" id="pwd-hints">
      <span id="h-upper" class="bad">• At least one uppercase letter</span>
      <span id="h-lower" class="bad">• At least one lowercase letter</span>
      <span id="h-len"   class="bad">• Minimum 8 characters</span>
    </div>

    <label for="confirm">Confirm Password</label>
    <div class="pwd-wrap">
      <input id="confirm" type="password" name="confirm_password" autocomplete="new-password" required placeholder="Confirm password" />
      <button type="button" class="pwd-toggle" id="pwd-eye2" aria-label="Toggle confirm password">
        <svg id="eye2-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
        <svg id="eye2-shut" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path fill="currentColor" d="M2.1 3.51 3.51 2.1 21.9 20.49 20.49 21.9l-2.3-2.3A12.8 12.8 0 0 1 12 19c-7 0-10-7-10-7a18.4 18.4 0 0 1 5.4-6.24L2.1 3.51zM7.82 9.23A4.98 4.98 0 0 0 7 12a5 5 0 0 0 7.77 4.08l-1.5-1.5a3 3 0 1 1-4.84-3.35zm3.47-2.86A12.6 12.6 0 0 1 12 6c7 0 10 7 10 7a18.6 18.6 0 0 1-3.18 4.32l-1.42-1.42A16.9 16.9 0 0 0 20.06 13c0 0-2.81-5.5-8.06-5.5-.28 0-.55.01-.81.03z"/></svg>
      </button>
    </div>
    <p class="field-err" id="confirm-err" style="display:none">Passwords do not match</p>

    <div class="row">
      <button type="submit" class="btn-submit" id="btn-signup">Create Account</button>
    </div>
    <p class="error" id="err"></p>
    <p class="terms">
      By creating an account you agree to our
      <a href="/terms.html" target="_blank" rel="noopener">Terms &amp; Conditions</a>.
    </p>
  </form>

  <script>
    const pwInput      = document.getElementById('pw')
    const confirmInput = document.getElementById('confirm')
    const phoneInput   = document.getElementById('phone')
    const emailInput   = document.getElementById('em')
    const btnSubmit    = document.getElementById('btn-signup')
    const errEl        = document.getElementById('err')

    // Password toggle helpers
    function togglePwd(inputEl, openSvg, shutSvg) {
      const show = inputEl.type === 'password'
      inputEl.type = show ? 'text' : 'password'
      openSvg.style.display = show ? 'none' : ''
      shutSvg.style.display = show ? '' : 'none'
    }
    document.getElementById('pwd-eye1').addEventListener('click', () =>
      togglePwd(pwInput, document.getElementById('eye1-open'), document.getElementById('eye1-shut')))
    document.getElementById('pwd-eye2').addEventListener('click', () =>
      togglePwd(confirmInput, document.getElementById('eye2-open'), document.getElementById('eye2-shut')))

    // Password hints
    function updateHints() {
      const v = pwInput.value
      const setHint = (id, ok) => {
        const el = document.getElementById(id)
        el.className = ok ? 'ok' : 'bad'
      }
      setHint('h-upper', /[A-Z]/.test(v))
      setHint('h-lower', /[a-z]/.test(v))
      setHint('h-len',   v.length >= 8)
    }
    pwInput.addEventListener('input', updateHints)

    // Confirm mismatch
    confirmInput.addEventListener('input', () => {
      const el = document.getElementById('confirm-err')
      el.style.display = (confirmInput.value && confirmInput.value !== pwInput.value) ? '' : 'none'
    })

    // Phone: digits only, max 10
    phoneInput.addEventListener('input', () => {
      const raw = phoneInput.value
      const hasNonDigit = /\D/.test(raw)
      phoneInput.value = raw.replace(/\D+/g, '').slice(0, 10)
      const errPhoneEl = document.getElementById('phone-err')
      if (hasNonDigit) {
        errPhoneEl.textContent = 'Digits only'
        errPhoneEl.style.display = ''
      } else {
        errPhoneEl.style.display = 'none'
      }
    })

    // Email: no Thai characters
    emailInput.addEventListener('input', () => {
      emailInput.value = emailInput.value.replace(/[฀-๿]+/g, '')
      const errEmailEl = document.getElementById('email-err')
      const valid = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(emailInput.value)
      errEmailEl.textContent = 'Invalid email address'
      errEmailEl.style.display = (emailInput.value && !valid) ? '' : 'none'
    })

    // Submit
    document.getElementById('frm').addEventListener('submit', async (e) => {
      e.preventDefault()
      errEl.textContent = ''

      const fullName = document.getElementById('full-name').value.trim()
      const phone    = phoneInput.value.trim()
      const email    = emailInput.value.trim()
      const password = pwInput.value
      const confirm  = confirmInput.value

      if (!fullName || !phone || !email) { errEl.textContent = 'All fields are required.'; return }
      if (!/^0\d{9}$/.test(phone))       { errEl.textContent = 'Phone must be 10 digits starting with 0.'; return }
      if (!/^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(email)) { errEl.textContent = 'Invalid email address.'; return }
      if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || password.length < 8) { errEl.textContent = 'Password does not meet requirements.'; return }
      if (password !== confirm)           { errEl.textContent = 'Passwords do not match.'; return }

      btnSubmit.disabled = true
      btnSubmit.textContent = 'Creating…'
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password, confirm_password: confirm, full_name: fullName, phone }),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || data.message || 'Sign up failed')
        // Notify opener and close this window
        if (window.opener) {
          window.opener.postMessage({ type: 'SIGNUP_SUCCESS', user: data.user }, '*')
        }
        window.close()
      } catch (err) {
        errEl.textContent = err.message
        btnSubmit.disabled = false
        btnSubmit.textContent = 'Create Account'
      }
    })
  </script>
</body>
</html>
